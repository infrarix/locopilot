<svg width="100" height="100" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="lpBody" x1="22" y1="40" x2="78" y2="88" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#C4B5FD"/>
      <stop offset="55%" stop-color="#8B5CF6"/>
      <stop offset="100%" stop-color="#5B21B6"/>
    </linearGradient>
    <linearGradient id="lpCap" x1="20" y1="14" x2="80" y2="46" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#1E3A8A"/>
    </linearGradient>
  </defs>

  <!-- Side ear modules (small, rounded, single LED) -->
  <rect x="13" y="58" width="9" height="14" rx="4.5" fill="#4C1D95"/>
  <rect x="78" y="58" width="9" height="14" rx="4.5" fill="#4C1D95"/>
  <circle cx="17.5" cy="65" r="1.5" fill="#22D3EE" opacity="0.85"/>
  <circle cx="82.5" cy="65" r="1.5" fill="#22D3EE" opacity="0.85"/>

  <!-- Robot head — soft squircle -->
  <rect x="22" y="40" width="56" height="48" rx="18" fill="url(#lpBody)"/>
  <rect x="26" y="44" width="22" height="14" rx="6" fill="#FFFFFF" opacity="0.10"/>

  <!-- Pilot cap dome -->
  <path d="M 22 46 Q 22 14 50 14 Q 78 14 78 46 Z" fill="url(#lpCap)"/>

  <!-- Cap brim -->
  <path d="M 18 46 L 82 46 L 84 50 L 16 50 Z" fill="#1E3A8A"/>

  <!-- Cap stitch -->
  <path d="M 26 42 Q 50 46 74 42" stroke="#60A5FA" stroke-width="1" fill="none" opacity="0.55" stroke-dasharray="2 2"/>

  <!-- Pilot wing badge -->
  <path d="M 38 28 L 50 26 L 62 28 L 56 32 L 50 31 L 44 32 Z" fill="#FBBF24"/>
  <circle cx="50" cy="29" r="2" fill="#F59E0B"/>

  <!-- Big cute eyes -->
  <ellipse cx="36" cy="64" rx="6" ry="7" fill="#0B0D17"/>
  <ellipse cx="64" cy="64" rx="6" ry="7" fill="#0B0D17"/>
  <ellipse cx="38" cy="61" rx="2" ry="2.5" fill="#FFFFFF"/>
  <ellipse cx="66" cy="61" rx="2" ry="2.5" fill="#FFFFFF"/>
  <circle cx="34" cy="66" r="1" fill="#FFFFFF" opacity="0.85"/>
  <circle cx="62" cy="66" r="1" fill="#FFFFFF" opacity="0.85"/>

  <!-- Cheek blush -->
  <ellipse cx="28" cy="74" rx="3.5" ry="2.5" fill="#F472B6" opacity="0.5"/>
  <ellipse cx="72" cy="74" rx="3.5" ry="2.5" fill="#F472B6" opacity="0.5"/>

  <!-- Cute smile -->
  <path d="M 43 78 Q 50 83 57 78" stroke="#0B0D17" stroke-width="2" fill="none" stroke-linecap="round"/>

  <!-- Status LED on chin -->
  <circle cx="50" cy="85" r="1.4" fill="#22D3EE"/>

  <!-- Antenna -->
  <line x1="50" y1="14" x2="50" y2="6" stroke="#475569" stroke-width="2" stroke-linecap="round"/>
  <circle cx="50" cy="5" r="2.5" fill="#22D3EE"/>
  <circle cx="50" cy="5" r="1" fill="#FFFFFF"/>
</svg>
